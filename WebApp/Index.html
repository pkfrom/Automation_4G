<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Report Interface Box</title>
    <!-- Tailwind CSS for Professional UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for parsing .xlsx files client-side -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Font Inter & Sarabun for Thai support -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: #f8fafc; /* Slate-50 */
        }
        .drop-zone {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drop-zone.dragover {
            border-color: #4f46e5;
            background-color: #eff6ff;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100">
        <!-- Header with Gradient and Icon -->
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 p-8 text-center relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white opacity-10 blur-xl"></div>
            
            <div class="relative z-10 flex flex-col items-center">
                <div class="bg-white/20 p-3 rounded-xl mb-4 backdrop-blur-sm border border-white/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <h1 class="text-white text-2xl font-bold tracking-tight shadow-sm">Device Report Interface Box</h1>
                <p class="text-blue-100 text-sm mt-2 font-light">อัปเดตข้อมูลอุปกรณ์</p>
            </div>
        </div>

        <!-- Content -->
        <div class="p-8">
            
            <!-- Upload Area -->
            <div id="drop-zone" class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-indigo-500 hover:bg-gray-50 group">
                <input type="file" id="fileInput" accept=".xlsx" class="hidden">
                
                <div class="mb-4 transform group-hover:-translate-y-1 transition-transform duration-300">
                    <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-indigo-500 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                
                <p class="text-lg text-gray-700 font-medium">ลากไฟล์ Report มาวางที่นี่</p>
                <p class="text-sm text-gray-500 mt-1">หรือ <span class="text-indigo-600 font-semibold hover:underline">คลิกเพื่อเลือกไฟล์</span></p>
                <div class="mt-4 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                    รองรับเฉพาะ .xlsx
                </div>
            </div>

            <!-- File Info (Hidden initially) -->
            <div id="file-info" class="hidden mt-6 bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-center justify-between shadow-sm">
                <div class="flex items-center">
                    <div class="bg-white p-2 rounded-lg mr-3">
                        <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <div>
                        <p id="file-name" class="text-sm font-semibold text-gray-900 truncate max-w-[180px]">filename.xlsx</p>
                        <p id="file-size" class="text-xs text-gray-500 font-mono">0 KB</p>
                    </div>
                </div>
                <button id="remove-file" class="p-1 hover:bg-white rounded-full transition-colors text-gray-400 hover:text-red-500">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Upload Button -->
            <button id="upload-btn" disabled class="group w-full mt-6 bg-indigo-600 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-200 transition-all hover:bg-indigo-700 hover:shadow-indigo-300 disabled:bg-gray-300 disabled:shadow-none disabled:cursor-not-allowed flex justify-center items-center">
                <span class="mr-2">อัปโหลดข้อมูล</span>
                <svg class="h-4 w-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>

            <!-- Status Message -->
            <div id="status-area" class="mt-6 text-center hidden transition-all duration-300">
                <div id="loading" class="hidden flex flex-col items-center justify-center text-indigo-600">
                    <svg class="animate-spin mb-3 h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-sm font-medium">กำลังประมวลผลข้อมูล...</span>
                </div>
                
                <div id="success-msg" class="hidden bg-green-50 text-green-700 border border-green-200 rounded-lg p-3 text-sm font-medium flex items-center justify-center">
                    <svg class="h-5 w-5 mr-2 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span id="success-text"></span>
                </div>

                <div id="error-msg" class="hidden bg-red-50 text-red-700 border border-red-200 rounded-lg p-3 text-sm font-medium flex items-center justify-center">
                    <svg class="h-5 w-5 mr-2 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span id="error-text"></span>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">V1.0</p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('file-info');
        const fileNameDisplay = document.getElementById('file-name');
        const fileSizeDisplay = document.getElementById('file-size');
        const removeFileBtn = document.getElementById('remove-file');
        const uploadBtn = document.getElementById('upload-btn');
        const statusArea = document.getElementById('status-area');
        const loading = document.getElementById('loading');
        const successMsg = document.getElementById('success-msg');
        const successText = document.getElementById('success-text');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');

        let selectedFile = null;

        // Drag & Drop Handling
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // Click Handling
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        removeFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetFile();
        });

        function handleFileSelect(file) {
            // Check for .xlsx
            if (file.name.split('.').pop().toLowerCase() !== 'xlsx') {
                showError('กรุณาเลือกไฟล์นามสกุล .xlsx เท่านั้น');
                return;
            }

            selectedFile = file;
            fileNameDisplay.textContent = file.name;
            fileSizeDisplay.textContent = (file.size / 1024).toFixed(2) + ' KB';
            
            dropZone.classList.add('hidden');
            fileInfo.classList.remove('hidden');
            uploadBtn.disabled = false;
            hideStatus();
        }

        function resetFile() {
            selectedFile = null;
            fileInput.value = '';
            dropZone.classList.remove('hidden');
            fileInfo.classList.add('hidden');
            uploadBtn.disabled = true;
            hideStatus();
        }

        function hideStatus() {
            statusArea.classList.add('hidden');
            loading.classList.add('hidden');
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
        }

        function showError(msg) {
            statusArea.classList.remove('hidden');
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
            loading.classList.add('hidden');
            successMsg.classList.add('hidden');
        }

        // Upload Process
        uploadBtn.addEventListener('click', () => {
            if (!selectedFile) return;

            statusArea.classList.remove('hidden');
            loading.classList.remove('hidden');
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
            uploadBtn.disabled = true;

            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    // ดึงชื่อชีตแรก
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // แปลงเป็น JSON Array (Array of Arrays)
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                    // เรียกฟังก์ชันของ Google Apps Script
                    google.script.run
                        .withSuccessHandler((response) => {
                            loading.classList.add('hidden');
                            if (response.success) {
                                successText.textContent = `อัปเดตข้อมูลสำเร็จ ${response.count} แถว`;
                                successMsg.classList.remove('hidden');
                                setTimeout(resetFile, 3000); 
                            } else {
                                showError('เกิดข้อผิดพลาด: ' + response.error);
                                uploadBtn.disabled = false;
                            }
                        })
                        .withFailureHandler((error) => {
                            loading.classList.add('hidden');
                            showError('ข้อผิดพลาดการเชื่อมต่อ: ' + error);
                            uploadBtn.disabled = false;
                        })
                        .importData(jsonData);

                } catch (err) {
                    loading.classList.add('hidden');
                    showError('ไม่สามารถอ่านไฟล์ได้: ' + err.message);
                    uploadBtn.disabled = false;
                }
            };

            reader.readAsArrayBuffer(selectedFile);
        });
    </script>
</body>
</html>
